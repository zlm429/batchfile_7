version: '1.0'
name: macos-build-pipeline
displayName: macOS自动打包
stages:
  - stage:
    name: build
    displayName: 编译构建
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven构建
        jdkVersion: 17
        mavenVersion: 3.6.3
        commands:
          - mvn -B clean package -Dmaven.test.skip=true
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
      - step: build@custom
        name: build_dmg
        displayName: 打包DMG
        platform: macos
        jdkVersion: 17
        commands:
          - chmod +x mvnw
          - jpackage --input target --name BatchRenameTool --main-jar batchfile_app-0.0.1-SNAPSHOT.jar --main-class com.rt.batchfile_app.BatchfileAppApplication --dest target/dist --type dmg --app-version 1.0.0 --vendor RT --java-options "--add-modules" --java-options "javafx.controls,javafx.fxml"
          - ls -lh target/dist/*.dmg
        artifacts:
          - name: DMG_ARTIFACT
            path:
              - ./target/dist/*.dmg
        dependsOn: build_maven
triggers:
  push:
    branches:
      include:
        - master
        - main
