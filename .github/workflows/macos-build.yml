name: macOS Build and Package (Intel x64)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch

jobs:
  build-macos-intel:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Intel专属JavaFX17
        run: |
          curl -L https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-x64_bin-sdk.zip -o javafx.zip
          unzip -q javafx.zip -d /tmp/
          echo "JAVAFX_PATH=/tmp/javafx-sdk-17.0.2/lib" >> $GITHUB_ENV

      - name: Maven编译打包
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: jpackage打包DMG
        run: |
          mkdir -p target/dist
          jpackage --input target \
            --name "BatchRenameTool" \
            --main-jar batchfile_app-0.0.1-SNAPSHOT.jar \
            --main-class com.rt.batchfile_app.BatchfileAppApplication \
            --dest target/dist \
            --type dmg \
            --app-version 1.0.0 \
            --vendor "RT" \
            --mac-package-identifier com.rt.batchtool \
            --module-path $JAVAFX_PATH \
            # 补齐全部必需模块：jdk.unsupported+java.xml
            --add-modules java.base,java.desktop,java.xml,jdk.unsupported,javafx.base,javafx.controls,javafx.fxml,javafx.graphics \
            --java-options "-Dfile.encoding=UTF-8" \
            --verbose

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: BatchRenameTool-macOS-Intel
          path: target/dist/*.dmg
