name: macOS Build (Intel)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15-intel
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JavaFX for Intel Mac
        run: |
          curl -L https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-x64_bin-sdk.zip -o javafx.zip
          unzip -q javafx.zip -d /tmp/
          echo "JAVAFX_PATH=/tmp/javafx-sdk-17.0.2/lib" >> "$GITHUB_ENV"

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Package DMG
        run: |
          mkdir -p target/dist
          jpackage --type dmg \
            --input target \
            --dest target/dist \
            --name "BatchRenameTool" \
            --main-jar "batchfile_app-0.0.1-SNAPSHOT.jar" \
            --main-class "com.rt.batchfile_app.BatchfileAppApplication" \
            --app-version 1.0.0 \
            --vendor "RT" \
            --mac-package-identifier com.rt.batchtool \
            --module-path "${{ env.JAVAFX_PATH }}" \
            --add-modules java.base,java.desktop,java.xml,jdk.unsupported,javafx.base,javafx.controls,javafx.fxml,javafx.graphics \
            --java-options "-Dfile.encoding=UTF-8" \
            --verbose

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: BatchRenameTool-macOS-Intel
          path: target/dist/*.dmg
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: target/dist/*.dmg
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 批量文件夹重命名工具 - macOS Intel 版本
            
            ### 功能特性
            - ✅ 批量重命名文件夹（支持 Excel 导入）
            - ✅ 批量重命名文件夹内的文件
            - ✅ 自动分类文件到对应文件夹
            
            ### 系统要求
            - macOS 10.15+
            - Intel 处理器（原生支持）
            - 无需安装 Java
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
