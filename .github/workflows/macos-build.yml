name: macOS Build and Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 允许在网页上手动触发
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    strategy:
      matrix:
        os: [macos-latest, macos-13] # macos-latest = ARM64, macos-13 = Intel
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Detect macOS Architecture
      run: |
        ARCH=$(uname -m)
        if [ "$ARCH" = "arm64" ]; then
          echo "JAVAfx_URL=https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-aarch64_bin-sdk.zip" >> $GITHUB_ENV
          echo "PLATFORM_NAME=Apple-Silicon" >> $GITHUB_ENV
        else
          echo "JAVAFX_URL=https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-x64_bin-sdk.zip" >> $GITHUB_ENV
          echo "PLATFORM_NAME=Intel" >> $GITHUB_ENV
        fi
    
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-${{ matrix.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.os }}-maven-
    
    - name: Build with Maven
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests
    
    - name: Download JavaFX SDK
      run: |
        curl -L ${{ env.JAVAFX_URL }} -o javafx.zip
        unzip javafx.zip -d /tmp/
        mv /tmp/javafx-sdk-17.0.2 /tmp/javafx-sdk
        echo "JAVAFX_PATH=/tmp/javafx-sdk/lib" >> $GITHUB_ENV
    
    - name: Package as DMG
      run: |
        # 使用 JavaFX module-path 打包
        jpackage --input target \
                 --name "BatchRenameTool" \
                 --main-jar batchfile_app-0.0.1-SNAPSHOT.jar \
                 --main-class com.rt.batchfile_app.BatchfileAppApplication \
                 --dest target/dist \
                 --type dmg \
                 --app-version 1.0.0 \
                 --vendor RT \
                 --module-path ${{ env.JAVAFX_PATH }} \
                 --add-modules javafx.controls,javafx.fxml \
                 --java-options "-Dfile.encoding=UTF-8"
    
    - name: Upload DMG artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: BatchRenameTool-macOS-${{ env.PLATFORM_NAME }}
        path: target/dist/*.dmg
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && success()
      uses: softprops/action-gh-release@v2
      with:
        files: target/dist/*.dmg
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 批量文件夹重命名工具 - macOS 版本
          
          ### 功能特性
          - ✅ 批量重命名文件夹（支持 Excel 导入）
          - ✅ 批量重命名文件夹内的文件
          - ✅ 自动分类文件到对应文件夹（新功能）
          
          ### 选择正确的版本
          - **Apple Silicon (M1/M2/M3)**: 适用于 2020 年后的新款 Mac
          - **Intel**: 适用于 2020 年前的老款 Mac
          
          ### 如何查看您的 Mac 架构？
          点击左上角 苹果菜单 → 关于本机 → 查看"芯片"或"处理器"
          - 显示"Apple M1/M2/M3" → 下载 Apple-Silicon 版本
          - 显示"Intel" → 下载 Intel 版本
          
          ### 安装说明
          1. 下载对应的 DMG 文件
          2. 双击打开
          3. 将应用拖拽到 Applications 文件夹
          4. 首次运行：右键点击 → 选择"打开" → 再次点击"打开"
          
          ### 系统要求
          - macOS 10.14 或更高版本
          - 无需安装 Java 环境（已内置 JRE）
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
