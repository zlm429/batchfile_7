name: macOS Build and Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 允许在网页上手动触发
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 强制使用 Node.js 24

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Detect macOS Architecture
      run: |
        echo "PLATFORM_NAME=Intel" >> $GITHUB_ENV
    
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    
    - name: Build with Maven
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests
    
    - name: Download JavaFX SDK
      run: |
        # 下载 Intel x64 版本的 JavaFX SDK
        echo "JAVAFX_URL=https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-x64_bin-sdk.zip" >> $GITHUB_ENV
        curl -L ${{ env.JAVAFX_URL }} -o javafx.zip
        unzip javafx.zip -d /tmp/
        mv /tmp/javafx-sdk-17.0.2 /tmp/javafx-sdk
        echo "JAVAFX_PATH=/tmp/javafx-sdk/lib" >> $GITHUB_ENV
    
    - name: Package as DMG
      run: |
        jpackage --input target \
                 --name "BatchRenameTool" \
                 --main-jar batchfile_app-0.0.1-SNAPSHOT.jar \
                 --main-class com.rt.batchfile_app.BatchfileAppApplication \
                 --dest target/dist \
                 --type dmg \
                 --app-version 1.0.0 \
                 --vendor RT \
                 --module-path ${{ env.JAVAFX_PATH }} \
                 --add-modules javafx.controls,javafx.fxml \
                 --java-options "-Dfile.encoding=UTF-8" \
                 --mac-package-signing-prefix com.rt \
                 --app-image target/app-image
    
    - name: Upload DMG artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: BatchRenameTool-macOS-${{ env.PLATFORM_NAME }}
        path: target/dist/*.dmg
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && success()
      uses: softprops/action-gh-release@v2
      with:
        files: target/dist/*.dmg
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 批量文件夹重命名工具 - macOS 版本
          
          ### 功能特性
          - ✅ 批量重命名文件夹（支持 Excel 导入）
          - ✅ 批量重命名文件夹内的文件
          - ✅ 自动分类文件到对应文件夹（新功能）
          
          ### 系统要求
          - macOS 10.14 或更高版本
          - 无需安装 Java 环境（已内置 JRE）
          - 支持 Intel 和 Apple Silicon (M1/M2/M3)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
