name: Windows Build and Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    
    - name: Build with Maven
      run: |
        .\mvnw.cmd clean package -DskipTests
    
    - name: Download JavaFX SDK
      run: |
        curl -L https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-sdk.zip -o javafx.zip
        Expand-Archive -Path javafx.zip -DestinationPath C:\javafx
        Move-Item -Path "C:\javafx\javafx-sdk-17.0.2" -Destination "C:\javafx-sdk"
        echo "JAVAFX_PATH=C:\javafx-sdk\lib" >> $env:GITHUB_ENV
    
    - name: Download Launch4j
      run: |
        # 使用 Chocolatey 安装 Launch4j
        choco install launch4j -y --no-progress
        
        # 验证安装
        if (Test-Path "C:\ProgramData\chocolatey\lib\launch4j\tools\launch4j-3.50\launch4j.exe") {
          Copy-Item "C:\ProgramData\chocolatey\lib\launch4j\tools\launch4j-3.50\*" -Destination "C:\launch4j" -Recurse -Force
          Write-Host "Launch4j 通过 Chocolatey 安装成功"
        } else {
          # 备选方案：使用 Maven 插件
          Write-Host "Chocolatey 安装失败，使用 Maven Launch4j Plugin"
          echo "USE_MAVEN_PLUGIN=true" >> $env:GITHUB_ENV
        }
    
    - name: Download JRE 17
      run: |
        # 下载 Eclipse Temurin JRE 17
        curl -L https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jre_x64_windows_hotspot_17.0.9_9.zip -o jre.zip
        Expand-Archive -Path jre.zip -DestinationPath target/jre
        # 重命名为更短的路径
        Get-ChildItem target/jre -Directory | Select-Object -First 1 | Rename-Item -NewName "jdk-17"
        echo "JRE_PATH=target/jre/jdk-17" >> $env:GITHUB_ENV
    
    - name: Package as EXE (Launch4j)
      if: env.USE_MAVEN_PLUGIN != 'true'
      run: |
        # 创建 Launch4j 配置文件
        @'
        <?xml version="1.0" encoding="UTF-8"?>
        <launch4jConfig>
          <dontWrapJar>false</dontWrapJar>
          <headerType>gui</headerType>
          <jar>target\batchfile_app-0.0.1-SNAPSHOT.jar</jar>
          <outfile>target\dist\BatchRenameTool.exe</outfile>
          <errTitle>BatchRenameTool</errTitle>
          <chdir>.</chdir>
          <priority>normal</priority>
          <downloadUrl>https://www.java.com/download/</downloadUrl>
          <supportUrl>https://github.com/zlm429/batchfile_new</supportUrl>
          <customProcName>false</customProcName>
          <stayAlive>false</stayAlive>
          <icon></icon>
          <jre>
            <path>jre</path>
            <bundledJre64Bit>true</bundledJre64Bit>
            <bundledJreAsFallback>false</bundledJreAsFallback>
            <minVersion>17</minVersion>
            <jdkPreference>preferJre</jdkPreference>
            <runtimeBits>64</runtimeBits>
          </jre>
        </launch4jConfig>
        '@ | Out-File -FilePath launch4j-config.xml -Encoding UTF8
        
        # 使用 Launch4j 打包
        & "C:\launch4j\launch4j.exe" launch4j-config.xml
    
    - name: Package as EXE (Maven Plugin)
      if: env.USE_MAVEN_PLUGIN == 'true'
      run: |
        # 添加 Maven Launch4j Plugin 到 pom.xml
        @"
        <plugin>
            <groupId>org.apache.maven.plugins</groupId>
            <artifactId>launch4j-maven-plugin</artifactId>
            <version>2.1.1</version>
            <executions>
                <execution>
                    <id>l4j-clr</id>
                    <phase>package</phase>
                    <goals>
                        <goal>launch4j</goal>
                    </goals>
                    <configuration>
                        <headerType>gui</headerType>
                        <outfile>target/dist/BatchRenameTool.exe</outfile>
                        <jar>target/batchfile_app-0.0.1-SNAPSHOT.jar</jar>
                        <errTitle>BatchRenameTool</errTitle>
                        <classPath>
                            <mainClass>com.rt.batchfile_app.BatchfileAppApplication</mainClass>
                        </classPath>
                        <jre>
                            <path>jre</path>
                            <minVersion>17</minVersion>
                        </jre>
                        <versionInfo>
                            <fileVersion>1.0.0.0</fileVersion>
                            <txtFileVersion>1.0.0</txtFileVersion>
                            <fileDescription>Batch Rename Tool</fileDescription>
                            <productVersion>1.0.0.0</productVersion>
                            <txtProductVersion>1.0.0</txtProductVersion>
                            <productName>BatchRenameTool</productName>
                            <internalName>BatchRenameTool</internalName>
                            <originalFilename>BatchRenameTool.exe</originalFilename>
                        </versionInfo>
                    </configuration>
                </execution>
            </executions>
        </plugin>
        "@ | Out-File -FilePath l4j-plugin.xml -Encoding UTF8
        
        # 使用 Maven 打包
        .\mvnw.cmd launch4j:launch4j -Dlaunch4j.configFile=l4j-plugin.xml
    
    - name: Create EXE Distribution Package
      run: |
        # 创建发布包（包含 JRE、JavaFX、JAR 和 EXE）
        $distDir = "target/dist"
        $appName = "BatchRenameTool-Windows"
        New-Item -Path "$distDir\$appName" -ItemType Directory -Force
        
        # 复制 JRE
        Copy-Item "$env:JRE_PATH" -Destination "$distDir\$appName\jre" -Recurse
        
        # 复制所有 JavaFX 文件（包括 DLL）
        Copy-Item "C:\javafx-sdk\lib\*" -Destination "$distDir\$appName\lib" -Recurse -Force
        
        # 列出 lib 目录内容，确认 DLL 存在
        Write-Host "=== lib 目录内容 ==="
        Get-ChildItem "$distDir\$appName\lib" -Recurse -Filter "*.dll" | Select-Object Name, Length
        
        # 复制 JAR 文件
        Copy-Item "target\batchfile_app-0.0.1-SNAPSHOT.jar" -Destination "$distDir\$appName\"
        
        # 复制 Launch4j 生成的 EXE
        Copy-Item "target\dist\BatchRenameTool.exe" -Destination "$distDir\$appName\"
        
        # 创建启动脚本
        @'
        @echo off
        cd /d "%~dp0"
        start jre\bin\javaw.exe -jar batchfile_app-0.0.1-SNAPSHOT.jar
        '@ | Out-File -FilePath "$distDir\$appName\start.bat" -Encoding ASCII
        
        # 创建 README
        @'
        批量文件夹重命名工具 - Windows 版本
        
        使用方法：
        1. 解压到任意目录
        2. 双击 BatchRenameTool.exe 运行
        3. 或者运行 start.bat 启动
        
        注意：本版本自带 JRE 和 JavaFX，无需额外安装！
        '@ | Out-File -FilePath "$distDir\$appName\README.txt" -Encoding UTF8
        
        # 压缩成 ZIP
        Compress-Archive -Path "$distDir\$appName\*" -DestinationPath "$distDir\BatchRenameTool-Windows.zip" -Force
    
    - name: Upload Windows Package
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: BatchRenameTool-Windows
        path: target/dist/*.zip
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && success()
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/dist/*.zip
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 批量文件夹重命名工具 - Windows 版本
          
          ### 功能特性
          - ✅ 批量重命名文件夹（支持 Excel 导入）
          - ✅ 批量重命名文件夹内的文件
          - ✅ 自动分类文件到对应文件夹
          
          ### 安装说明
          
          1. 下载 `BatchRenameTool-Windows.zip`
          2. 解压到任意目录
          3. 双击 `BatchRenameTool.exe` 运行
          
          ### 系统要求
          - Windows 10 或更高版本
          - **无需安装 Java 环境**（已内置 JRE 17 和 JavaFX）
          - 约 200MB 磁盘空间
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
