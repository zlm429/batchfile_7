name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests
        shell: powershell

      - name: Download JavaFX SDK
        run: |
          Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-sdk.zip" -OutFile "javafx.zip"
          Expand-Archive -Path javafx.zip -DestinationPath C:\javafx
          Move-Item -Path "C:\javafx\javafx-sdk-17.0.2" -Destination "C:\javafx-sdk"
        shell: powershell

      - name: Download JRE 17 (Temurin)
        run: |
          Invoke-WebRequest -Uri "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.11%2B9/OpenJDK17U-jre_x64_windows_hotspot_17.0.11_9.zip" -OutFile "jre17.zip"
          Expand-Archive -Path "jre17.zip" -DestinationPath "target\jre" -Force
        shell: powershell

      - name: Create Custom JRE with jlink
        run: |
          Write-Host "Creating custom JRE with jlink..."
          $jdkHome = $env:JAVA_HOME
          $jlinkPath = Join-Path $jdkHome "bin\jlink.exe"
          
          # Create custom JRE with all required modules
          & $jlinkPath `
            --add-modules java.base,java.desktop,java.xml,java.sql,java.naming,java.management,java.logging,java.scripting,jdk.unsupported `
            --output "target\custom-jre" `
            --compress=2 `
            --no-header-files `
            --no-man-pages
          
          Write-Host "Custom JRE created!"
          Get-ChildItem "target\custom-jre" -Recurse | Measure-Object -Property Length -Sum | Select-Object Count, @{Name="Size(MB)";Expression={[math]::Round($_.Sum/1MB,2)}}
        shell: powershell

      - name: Create Distribution Package
        run: |
          New-Item -Path "target\dist\BatchRenameTool-Windows" -ItemType Directory -Force
          
          # Copy custom JRE
          New-Item -Path "target\dist\BatchRenameTool-Windows\jre" -ItemType Directory -Force
          Copy-Item -Recurse "target\custom-jre\*" "target\dist\BatchRenameTool-Windows\jre" -Force
          
          # Create lib directory
          New-Item -Path "target\dist\BatchRenameTool-Windows\lib" -ItemType Directory -Force
          
          # Copy JAR
          Copy-Item "target\batchfile_app-0.0.1-SNAPSHOT.jar" "target\dist\BatchRenameTool-Windows\"
          
          # Copy JavaFX SDK (JAR + native DLL)
          Copy-Item -Recurse "C:\javafx-sdk\lib\*.jar" "target\dist\BatchRenameTool-Windows\lib\" -Force
          Copy-Item -Recurse "C:\javafx-sdk\bin\*.dll" "target\dist\BatchRenameTool-Windows\lib\" -Force
          
          # Create launcher batch file
          @'
          @echo off
          cd /d "%~dp0"
          start /min "" cmd /c "jre\bin\javaw.exe -jar batchfile_app-0.0.1-SNAPSHOT.jar"
          exit
          '@ | Out-File -FilePath "target\dist\BatchRenameTool-Windows\BatchRenameTool.bat" -Encoding ASCII
          
          # Create startup script with error display
          @'
          @echo off
          cd /d "%~dp0"
          echo Starting BatchRenameTool...
          echo.
          set JAVAFX_PATH=%~dp0lib
          jre\bin\java.exe ^
            --module-path "%JAVAFX_PATH%" ^
            --add-modules java.base,java.desktop,java.xml,java.sql,jdk.unsupported,javafx.controls,javafx.fxml ^
            -Djava.library.path="%JAVAFX_PATH%" ^
            -jar batchfile_app-0.0.1-SNAPSHOT.jar
          if errorlevel 1 (
            echo.
            echo Error occurred! Press any key to exit...
            pause >nul
          )
          '@ | Out-File -FilePath "target\dist\BatchRenameTool-Windows\start.bat" -Encoding ASCII
          
          # Create README
          @'
          Batch Rename Tool - Windows Version
          
          Usage:
          1. Extract to any directory
          2. Double-click BatchRenameTool.bat to run
          
          Note: This version includes JRE and JavaFX, no additional installation required!
          '@ | Out-File -FilePath "target\dist\BatchRenameTool-Windows\README.txt" -Encoding UTF8
          
          # Compress
          Compress-Archive -Path "target\dist\BatchRenameTool-Windows\*" -DestinationPath "target\dist\BatchRenameTool-Windows.zip" -Force
          
          Write-Host "Package created successfully!"
          Get-Item "target\dist\BatchRenameTool-Windows.zip" | Select-Object Name, Length
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BatchRenameTool-Windows
          path: target/dist/BatchRenameTool-Windows.zip
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: target/dist/BatchRenameTool-Windows.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Batch Rename Tool - Windows Version
            
            ### Features
            - ✅ Batch rename folders (Excel import supported)
            - ✅ Batch rename files in folders
            - ✅ Auto classify files into folders
            
            ### Installation
            
            1. Download `BatchRenameTool-Windows.zip`
            2. Extract to any directory
            3. Double-click `BatchRenameTool.bat` to run
            
            ### System Requirements
            - Windows 10 or higher
            - **No Java installation required** (JRE 17 and JavaFX included)
            - ~200MB disk space
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
