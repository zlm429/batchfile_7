name: Windows Build and Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    
    - name: Build with Maven
      run: |
        .\mvnw.cmd clean package -DskipTests
    
    - name: Download JavaFX SDK
      run: |
        curl -L https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-sdk.zip -o javafx.zip
        Expand-Archive -Path javafx.zip -DestinationPath C:\javafx
        Move-Item -Path "C:\javafx\javafx-sdk-17.0.2" -Destination "C:\javafx-sdk"
        echo "JAVAFX_PATH=C:\javafx-sdk\lib" >> $env:GITHUB_ENV
    
    - name: Download Launch4j
      run: |
        curl -L https://github.com/TheBoegl/launch4j/releases/download/3.50/launch4j-3.50-win64.zip -o launch4j.zip
        Expand-Archive -Path launch4j.zip -DestinationPath C:\launch4j
    
    - name: Package as EXE (Launch4j)
      run: |
        # 创建 Launch4j 配置文件
        @'
        <?xml version="1.0" encoding="UTF-8"?>
        <launch4jConfig>
          <dontWrapJar>false</dontWrapJar>
          <headerType>gui</headerType>
          <jar>target\batchfile_app-0.0.1-SNAPSHOT.jar</jar>
          <outfile>target\dist\BatchRenameTool.exe</outfile>
          <errTitle>BatchRenameTool</errTitle>
          <cmdLine>--add-modules=javafx.controls,javafx.fxml</cmdLine>
          <chdir>.</chdir>
          <priority>normal</priority>
          <downloadUrl>https://www.java.com/download/</downloadUrl>
          <supportUrl>https://github.com/zlm429/batchfile_new</supportUrl>
          <customProcName>false</customProcName>
          <stayAlive>false</stayAlive>
          <icon></icon>
          <jre>
            <path></path>
            <bundledJre64Bit>true</bundledJre64Bit>
            <bundledJreAsFallback>false</bundledJreAsFallback>
            <minVersion>17</minVersion>
            <jdkPreference>jdkOnly</jdkPreference>
            <runtimeBits>64</runtimeBits>
            <opt>--module-path=C:\javafx-sdk\lib</opt>
            <opt>--add-modules=java.base,java.desktop,javafx.controls,javafx.fxml</opt>
          </jre>
        </launch4jConfig>
        '@ | Out-File -FilePath launch4j-config.xml -Encoding UTF8
        
        # 使用 Launch4j 打包
        & "C:\launch4j\launch4j.exe" launch4j-config.xml
    
    - name: Create EXE Distribution Package
      run: |
        # 创建发布包（包含 JAR 和启动脚本）
        $distDir = "target/dist"
        New-Item -Path "$distDir\BatchRenameTool-Windows" -ItemType Directory -Force
        
        # 复制 JAR 文件
        Copy-Item "target\batchfile_app-0.0.1-SNAPSHOT.jar" -Destination "$distDir\BatchRenameTool-Windows\"
        
        # 复制 Launch4j 生成的 EXE
        Copy-Item "target\dist\BatchRenameTool.exe" -Destination "$distDir\BatchRenameTool-Windows\"
        
        # 创建启动脚本
        @'
        @echo off
        cd /d "%~dp0"
        start javaw --module-path="C:\javafx-sdk\lib" --add-modules=java.base,java.desktop,javafx.controls,javafx.fxml -jar batchfile_app-0.0.1-SNAPSHOT.jar
        '@ | Out-File -FilePath "$distDir\BatchRenameTool-Windows\start.bat" -Encoding ASCII
        
        # 创建 README
        @'
        批量文件夹重命名工具 - Windows 版本
        
        使用方法：
        1. 确保已安装 JDK 17 或更高版本
        2. 双击 BatchRenameTool.exe 运行
        3. 或者运行 start.bat 启动
        
        如遇到问题，请确保：
        - 已安装 JDK 17+
        - JavaFX SDK 在 C:\javafx-sdk 目录
        '@ | Out-File -FilePath "$distDir\BatchRenameTool-Windows\README.txt" -Encoding UTF8
        
        # 压缩成 ZIP
        Compress-Archive -Path "$distDir\BatchRenameTool-Windows\*" -DestinationPath "$distDir\BatchRenameTool-Windows.zip" -Force
    
    - name: Upload Windows Package
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: BatchRenameTool-Windows
        path: target/dist/*.zip
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && success()
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/dist/*.zip
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 批量文件夹重命名工具 - Windows 版本
          
          ### 功能特性
          - ✅ 批量重命名文件夹（支持 Excel 导入）
          - ✅ 批量重命名文件夹内的文件
          - ✅ 自动分类文件到对应文件夹
          
          ### 安装说明
          
          1. 下载 `BatchRenameTool-Windows.zip`
          2. 解压到任意目录
          3. 双击 `BatchRenameTool.exe` 运行
          
          ### 系统要求
          - Windows 10 或更高版本
          - 需要安装 JDK 17 或更高版本
          - 需要下载 JavaFX SDK 到 `C:\javafx-sdk`
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
